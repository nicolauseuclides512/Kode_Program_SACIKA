name: SACIKA CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sacika-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm test

  frontend:
    name: Frontend tests, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm install dipakai sementara package-lock diperbarui oleh instalasi paket test baru.
      # Setelah package-lock terbaru di-commit, langkah ini dapat diubah menjadi npm ci.
      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Run frontend static and component tests
        run: npm run test:all

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api

  worker:
    name: Python worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sacika-worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sacika-worker/requirements.txt

      - name: Install worker dependencies
        run: python -m pip install -r requirements.txt

      - name: Run worker tests
        run: python -m unittest discover -s tests -v
        env:
          FORECAST_WORKER_API_KEY: ci_worker_secret_that_is_longer_than_32_characters

  backend-worker-contract:
    name: Backend-worker contract test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sacika-worker/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install worker dependencies
        working-directory: sacika-worker
        run: python -m pip install -r requirements.txt

      - name: Run backend-worker contract test
        working-directory: backend
        run: npm run test:integration
        env:
          PYTHON_BIN: python

  postgres-integration:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sacika_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sacika_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run PostgreSQL integration tests
        run: npm run test:db
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sacika_development_not_used
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sacika_test
          JWT_SECRET: ci_jwt_secret_that_is_longer_than_32_characters
          JWT_EXPIRES_IN: 5m
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          REQUEST_LOG_ENABLED: "false"
          LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 100
